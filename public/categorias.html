<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerir Categorias</title>
    <link rel="stylesheet" href="./css/header.css" />
    <link rel="stylesheet" href="./css/restaurant-shell.css" />
    <script type="module" src="./js/restaurant-auth.js"></script>
    <style>
      .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
      .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
      .card{display:grid;gap:12px;border:1px solid #dbe3ef;border-radius:20px;background:#fff;padding:16px}
      .card input{min-height:44px;border:1px solid #dbe3ef;border-radius:14px;padding:0 12px;font:inherit}
      .actions{display:flex;gap:10px;flex-wrap:wrap}
    </style>
  </head>
  <body>
    <header>
      <div class="logo-title"><div class="brand-chip">Restaurant OS</div></div>
      <div class="links-container"><nav id="navLinks"><a href="./artigos.html" class="protected active">Voltar aos pratos</a></nav></div>
      <div id="tokenDisplay" class="token-status">Categorias</div>
    </header>
    <div class="page-shell">
      <div id="operatorShell"></div>
      <section class="panel">
        <div class="toolbar">
          <div>
            <div class="shell-eyebrow">CATÁLOGO BASE</div>
            <h1 class="shell-title" style="margin:0">Gerir categorias</h1>
          </div>
          <button id="newBtn" class="primary-btn">Nova categoria</button>
        </div>
        <div id="grid" class="grid"></div>
      </section>
    </div>
    <script type="module">
      import { restaurantApi, setTerminalId } from "./js/restaurant-api.js";
      import { mountOperatorShell, toast } from "./js/restaurant-shell.js";
      setTerminalId("terminal_main");
      await mountOperatorShell({ title: "Gerir Categorias", eyebrow: "Catálogo base" });
      const grid = document.getElementById("grid");
      document.getElementById("newBtn").addEventListener("click", async () => {
        const name = prompt("Nome da categoria:");
        if (!name) return;
        try {
          await restaurantApi.createCategory({ name });
          toast("Categoria criada.");
          await refresh();
        } catch (error) { toast(error.message, true); }
      });
      await refresh();
      async function refresh() {
        const rows = await restaurantApi.listCategories();
        grid.innerHTML = rows.length ? rows.map((row) => `
          <article class="card" data-id="${row.id}">
            <input value="${escapeHtml(row.name)}" data-field="name" />
            <div class="helper-text">${row.items_count || 0} artigo(s)</div>
            <div class="actions">
              <button class="primary-btn" data-action="save">Guardar</button>
              <button class="ghost-btn" data-action="delete">Apagar</button>
            </div>
          </article>`).join("") : `<div class="empty-state">Sem categorias.</div>`;
        grid.querySelectorAll("[data-action='save']").forEach((btn) => btn.addEventListener("click", async () => {
          const card = btn.closest("[data-id]");
          try {
            await restaurantApi.updateCategory(card.dataset.id, { name: card.querySelector("[data-field='name']").value.trim() });
            toast("Categoria atualizada.");
            await refresh();
          } catch (error) { toast(error.message, true); }
        }));
        grid.querySelectorAll("[data-action='delete']").forEach((btn) => btn.addEventListener("click", async () => {
          const card = btn.closest("[data-id]");
          if (!confirm("Apagar categoria?")) return;
          try {
            await restaurantApi.deleteCategory(card.dataset.id);
            toast("Categoria apagada.");
            await refresh();
          } catch (error) { toast(error.message, true); }
        }));
      }
      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }
    </script>
  </body>
</html>
