<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faturas</title>
    <link rel="stylesheet" href="./css/header.css" />
    <link rel="stylesheet" href="./css/restaurant-shell.css" />
    <script type="module" src="./js/restaurant-auth.js"></script>
    <style>
      .page-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}
      .invoice-table{width:100%;border-collapse:collapse}
      .invoice-table th,.invoice-table td{padding:10px;border-bottom:1px solid #e2e8f0;text-align:left;vertical-align:top}
      .invoice-table th{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:#64748b}
      .invoice-card{display:grid;gap:10px;padding:14px;border:1px solid #dbe3ef;border-radius:18px;background:#fff}
      .tiny{font-size:13px;color:#64748b}
      @media (max-width:1000px){.page-grid{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <header>
      <div class="logo-title"><div class="brand-chip">Restaurant OS</div></div>
      <div class="links-container">
        <nav id="navLinks">
          <a href="./takeway.html" class="protected">Takeway</a>
          <a href="./rececaoBar.html" class="protected">Receção Bar</a>
          <a href="./rececaoCozi.html" class="protected">Receção Cozinha</a>
          <a href="./cozinha.html" class="protected">Cozinha</a>
          <a href="./faturas.html" class="protected active">Ver Faturas</a>
          <a href="./artigos.html" class="protected">Gerir Pratos</a>
          <a href="./menu.html" class="protected">Gestão Menu</a>
          <a href="./gest_mesas.html" class="protected">Gestão Mesas</a>
        </nav>
      </div>
      <div id="tokenDisplay" class="token-status">Faturação local</div>
    </header>

    <div class="page-shell">
      <div id="operatorShell"></div>
      <div class="page-actions"><button id="refreshBtn" class="ghost-btn">Atualizar</button></div>
      <div class="page-grid">
        <section class="panel">
          <div class="panel-title-row"><div><strong>Faturas geradas</strong><div class="helper-text">Checkout local, método de pagamento e envio por email.</div></div></div>
          <div class="table-scroll" id="localInvoicesBox"><div class="empty-state">A carregar...</div></div>
        </section>
        <section class="panel">
          <div class="panel-title-row"><div><strong>Resumo operacional</strong><div class="helper-text">Sessões abertas e sessões fechadas recentemente.</div></div></div>
          <div id="serviceBoard" class="list-stack"></div>
        </section>
      </div>
    </div>

    <script type="module">
      import { restaurantApi, setTerminalId } from './js/restaurant-api.js';
      import { mountOperatorShell, euro, toast } from './js/restaurant-shell.js';
      setTerminalId('terminal_main');
      await mountOperatorShell({ title: 'Faturas', eyebrow: 'Operação + checkout' });
      const serviceBoardNode = document.getElementById('serviceBoard');
      const invoicesBox = document.getElementById('localInvoicesBox');
      document.getElementById('refreshBtn').addEventListener('click', refreshAll);
      await refreshAll();

      async function refreshAll() {
        const [board, invoices] = await Promise.all([restaurantApi.serviceBoard(), restaurantApi.listLocalInvoices()]);
        renderServiceBoard(board);
        renderInvoices(invoices || []);
      }

      function renderServiceBoard(board) {
        const openCards = (board.open_tables || []).map((table) => `<article class="invoice-card"><strong>${table.name}</strong><div class="tiny">${table.session?.status || 'livre'} · ${table.metrics?.total_items || 0} itens · ${euro(table.metrics?.total || 0)}</div></article>`).join('') || `<div class="empty-state">Nenhuma mesa/slot aberto.</div>`;
        const closedCards = (board.closed_sessions || []).slice(0, 8).map((session) => `<article class="invoice-card"><strong>${session.table_name}</strong><div class="tiny">Fechada por ${session.operator_name || '—'} · ${session.item_count || 0} itens · ${euro(session.total || 0)}</div></article>`).join('') || `<div class="empty-state">Sem sessões fechadas.</div>`;
        serviceBoardNode.innerHTML = `<div class="callout"><strong>Abertas</strong><div class="helper-text">O que ainda está em conta.</div></div>${openCards}<div class="callout" style="margin-top:10px"><strong>Fechadas</strong><div class="helper-text">Últimas sessões processadas.</div></div>${closedCards}`;
      }

      function renderInvoices(rows) {
        if (!rows.length) {
          invoicesBox.innerHTML = `<div class="empty-state">Ainda não existem faturas locais.</div>`;
          return;
        }
        invoicesBox.innerHTML = `
          <table class="invoice-table">
            <thead>
              <tr><th>Número</th><th>Data</th><th>Mesa/slot</th><th>Pagamento</th><th>Total</th><th>Email</th><th>Ficheiro</th></tr>
            </thead>
            <tbody>
              ${rows.map((row) => `
                <tr>
                  <td><strong>${row.number}</strong><div class="tiny">${row.customer_name || 'Consumidor final'}</div></td>
                  <td>${new Date(row.created_at).toLocaleString('pt-PT')}</td>
                  <td>${row.table_name || '—'}</td>
                  <td>${row.payment_type || '—'}</td>
                  <td>${euro(row.total || 0)}</td>
                  <td>${row.customer_email ? `${row.customer_email}<div class="tiny">${row.emailed_at ? 'Enviada' : 'Não enviada'}</div>` : '—'}</td>
                  <td>${row.file_path ? `<a href="${row.file_path}" target="_blank" rel="noopener">Abrir</a>` : '—'}</td>
                </tr>`).join('')}
            </tbody>
          </table>`;
      }
    </script>
  </body>
</html>
