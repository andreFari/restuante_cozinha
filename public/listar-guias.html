<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <title>Guias de Transporte</title>
    <link rel="stylesheet" href="css/header.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background-color: #f7f8fa;
        color: #333;
      }

      h1 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 2rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      }

      th,
      td {
        padding: 1rem;
        border: 1px solid #ddd;
        text-align: left;
      }

      th {
        background: #2980b9;
        color: white;
      }

      tr:nth-child(even) {
        background: #f2f2f2;
      }

      .empty {
        text-align: center;
        padding: 2rem;
        background: #fff3cd;
        color: #856404;
        border: 1px solid #ffeeba;
        border-radius: 4px;
      }

      button {
        background: #2980b9;
        color: white;
        border: none;
        padding: 0.4rem 0.8rem;
        border-radius: 4px;
        cursor: pointer;
      }

      button:hover {
        background: #1f5e85;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo-title">
        <div class="brand-chip">Restaurant OS</div>
      </div>

      <div class="links-container">
        <nav id="navLinks">
          <a href="./takeway.html" class="protected">Takeway</a>
          <a href="./login.html" class="protected">Receção Bar</a>
          <a href="./rececaoCozi.html" class="protected">Receção Cozinha</a>
          <a href="./cozinha-v2.html" class="protected">Cozinha</a>
          <a href="./faturas.html" class="protected active">Ver Faturas</a>
          <a href="./artigos.html" class="protected">Gerir Pratos</a>
          <a href="./menu.html" class="protected">Gestão Menu</a>
          <a href="./gest_mesas.html" class="protected">Gestão Mesas</a>
        </nav>
      </div>

      <div id="tokenDisplay" class="token-status">Sistema operacional</div>
    </header>
    <div style="padding: 20px">
      <h1>📄 Guias de Transporte</h1>

      <div id="tabelaGuias"></div>
    </div>
    <script>
      async function carregarGuias() {
        const container = document.getElementById("tabelaGuias");
        container.innerHTML = ""; // limpar conteúdo

        try {
          const res = await fetch("/molo/importar/guias");
          const guias = await res.json();

          if (!Array.isArray(guias) || guias.length === 0) {
            container.innerHTML =
              '<div class="empty">Nenhuma guia encontrada.</div>';
            return;
          }

          const tabela = document.createElement("table");
          tabela.innerHTML = `
            <thead>
              <tr>
                <th>Nº</th>
                <th>Data</th>
                <th>Cliente</th>
                <th>NIF</th>
                <th>Total Líquido</th>
                <th>Código AT</th>
                <th>Estado AT</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody>
              ${guias
                .map(
                  (g) => `
                <tr>
                  <td>${g.numero || "-"}</td>
                  <td>${new Date(g.data).toLocaleString("pt-PT")}</td>
                  <td>${g.cliente || "-"}</td>
                  <td>${g.nif || "-"}</td>
                  <td>${parseFloat(g.total || 0).toFixed(2)} €</td>
                  <td>${g.codigoAT || "-"}</td>
                    <td style="font-weight:bold; color:${
                      g.estadoAT === "Aceite pela AT" ? "green" : "orange"
                    };">
          ${g.estadoAT}
        </td>
                  <td><button  class="alterar" data-id="${
                    g.id
                  }">Alterar Código</button></td>
                 
                </tr>
              `
                )
                .join("")}
            </tbody>
          `;

          container.appendChild(tabela);

          // Adicionar event listener aos botões
          container.querySelectorAll("button.alterar").forEach((btn) => {
            btn.addEventListener("click", () => {
              const id = btn.getAttribute("data-id");
              definirCodigoAT(id);
            });
          });

          container.querySelectorAll("button.atualizar").forEach((btn) => {
            btn.addEventListener("click", () => {
              const id = btn.getAttribute("data-id");
              atualizarCodigoAT(id);
            });
          });
        } catch (err) {
          container.innerHTML =
            '<div class="empty">Erro ao carregar guias.</div>';
          console.error("Erro ao carregar guias:", err);
        }
      }
      async function atualizarCodigoAT(document_id) {
        try {
          const res = await fetch(`/molo/api/guias/${document_id}/refresh-at`);
          const data = await res.json();

          if (!data || !data.at_code) {
            alert("Código AT ainda não disponível para esta guia.");
            return;
          }

          alert(`Código AT atualizado: ${data.at_code}`);
          carregarGuias(); // recarrega para mostrar novo código na tabela
        } catch (err) {
          alert("Erro ao atualizar código AT automaticamente: " + err.message);
          console.error(err);
        }
      }
      async function definirCodigoAT(document_id) {
        const codigo = prompt(
          `Introduz o novo código AT para a guia ID ${document_id}`
        );
        if (!codigo) return;

        try {
          const res = await fetch(`/molo/guias/${document_id}/codigo-at`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ transport_code: codigo }),
          });

          const text = await res.text();

          let result;
          try {
            result = JSON.parse(text);
          } catch (e) {
            console.error("Resposta não JSON:", text);
            alert("Erro inesperado (resposta não JSON):\n" + text);
            return;
          }

          if (!res.ok) {
            alert(
              "Erro ao atualizar código AT: " +
                (result.detalhe || "Erro desconhecido")
            );
            return;
          }

          alert("Código AT atualizado com sucesso!");
          carregarGuias();
        } catch (err) {
          alert("Erro ao atualizar código AT: " + err.message);
        }
      }
      document.addEventListener("DOMContentLoaded", carregarGuias);
    </script>
    <script src="./js/header.js"></script>
  </body>
</html>
